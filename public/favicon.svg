<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C" />
      <stop offset="100%" stop-color="#A07828" />
    </linearGradient>
  </defs>
  <!-- Background subtle glow -->
  <circle cx="50" cy="50" r="45" fill="rgba(56,189,248,0.03)" stroke="rgba(56,189,248,0.12)" stroke-width="2"/>
  <!-- Mountain peak left side (Sky Blue) -->
  <path d="M 50 15 L 20 80 L 50 80 Z" fill="url(#blueGrad)" opacity="0.9" />
  <!-- Mountain peak right side (Gold) -->
  <path d="M 50 15 L 80 80 L 50 80 Z" fill="url(#goldGrad)" opacity="0.95" />
  <!-- Minimalist 'K2' lettering overlay inside the peak area -->
  <text x="50" y="68" font-family="'Inter', sans-serif" font-weight="900" font-size="20" fill="#E2E8F0" text-anchor="middle" letter-spacing="-1">K2</text>
</svg>